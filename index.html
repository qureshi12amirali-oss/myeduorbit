    // ============================================================
    // APP LOGIC
    // ============================================================

    // DOM refs
    const grid = document.getElementById('programGrid');
    const cityFilter = document.getElementById('cityFilter');
    const typeFilter = document.getElementById('typeFilter');
    const tuitionFilter = document.getElementById('tuitionFilter');
    const sortFilter = document.getElementById('sortFilter');
    const clearBtn = document.getElementById('clearFilters');
    const resultsCount = document.getElementById('resultsCount');

    const totalProgramsEl = document.getElementById('totalPrograms');
    const totalScholarshipsEl = document.getElementById('totalScholarships');
    const totalCitiesEl = document.getElementById('totalCities');

    let programs = [];

    // ============================================================
    // LOAD DATA
    // ============================================================

    function loadPrograms() {
        // OPTION 1: Hardcoded data (immediate)
        programs = PROGRAM_DATA;
        init();

        // OPTION 2: Fetch from JSON (uncomment when ready)
        // fetch('/_data/programs.json')
        //     .then(res => {
        //         if (!res.ok) throw new Error('Network error');
        //         return res.json();
        //     })
        //     .then(data => {
        //         programs = data;
        //         init();
        //     })
        //     .catch(err => {
        //         console.warn('Using fallback data:', err);
        //         programs = PROGRAM_DATA;
        //         init();
        //     });
    }

    // ============================================================
    // INITIALIZATION
    // ============================================================

    function init() {
        populateFilters();
        updateStats();
        render();
        showToast('✅ ' + programs.length + ' programs loaded');
    }

    function populateFilters() {
        const cities = [...new Set(programs.map(p => p.city))].sort();
        const citySelect = document.getElementById('cityFilter');
        citySelect.innerHTML = '<option value="all">All Cities</option>';
        cities.forEach(city => {
            const opt = document.createElement('option');
            opt.value = city;
            opt.textContent = city;
            citySelect.appendChild(opt);
        });
    }

    function updateStats() {
        totalProgramsEl.textContent = programs.length;
        totalScholarshipsEl.textContent = programs.filter(p => p.scholarship).length;
        totalCitiesEl.textContent = new Set(programs.map(p => p.city)).size;
    }

    // ============================================================
    // RENDER
    // ============================================================

    function getBadgeClass(badge) {
        if (!badge) return 'default';
        const b = badge.toLowerCase();
        if (b.includes('scholarship') || b.includes('full')) return 'scholarship';
        if (b.includes('popular') || b.includes('top')) return 'popular';
        if (b.includes('budget') || b.includes('cheap') || b.includes('lowest')) return 'budget';
        return 'default';
    }

    function render() {
        const city = cityFilter.value;
        const type = typeFilter.value;
        const tuitionMax = tuitionFilter.value;
        const sort = sortFilter.value;

        let filtered = programs.filter(p => {
            if (city !== 'all' && p.city !== city) return false;
            if (type !== 'all' && p.type !== type) return false;
            if (tuitionMax !== 'all') {
                const max = parseInt(tuitionMax);
                if (p.tuition > max) return false;
            }
            return true;
        });

        // Sort
        switch (sort) {
            case 'price-asc':
                filtered.sort((a, b) => a.tuition - b.tuition);
                break;
            case 'price-desc':
                filtered.sort((a, b) => b.tuition - a.tuition);
                break;
            case 'name':
                filtered.sort((a, b) => a.name.localeCompare(b.name));
                break;
            case 'popular':
                filtered.sort((a, b) => (b.popular ? 1 : 0) - (a.popular ? 1 : 0));
                break;
            default:
                filtered.sort((a, b) => a.tuition - b.tuition);
        }

        resultsCount.textContent = `Showing ${filtered.length} program${filtered.length !== 1 ? 's' : ''}`;

        if (filtered.length === 0) {
            grid.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-search"></i>
                    <p>No programs match your filters. Try adjusting your criteria.</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = filtered.map(p => {
            const tuitionDisplay = p.tuition === 0 ? 'FREE' : `¥${p.tuition.toLocaleString()}/year`;
            const badgeClass = getBadgeClass(p.badge);
            const scholarshipBadge = p.scholarship ?
                `<span class="scholarship-badge"><i class="fas fa-award"></i> Scholarship Available</span>` :
                '';

            const benefitsHTML = p.benefits.map(b => {
                let cls = 'benefit-tag';
                if (b.toLowerCase().includes('scholarship') || 
                    b.toLowerCase().includes('free') || 
                    b.toLowerCase().includes('stipend')) {
                    cls += ' scholarship-tag';
                }
                return `<span class="${cls}">${b}</span>`;
            }).join('');

            const whatsappNumber = '8618091995742';
            const whatsappMsg = encodeURIComponent(
                `Hi! I'm interested in "${p.name}" at ${p.university}. Can you tell me more?`
            );

            return `
                <div class="program-card">
                    <span class="card-badge ${badgeClass}">${p.badge || 'Program'}</span>
                    <div class="card-title">${p.name}</div>
                    <div class="card-university">${p.university}</div>
                    <div class="card-meta">
                        <span><i class="fas fa-map-pin"></i> ${p.city}</span>
                        <span><i class="fas fa-tag"></i> ${p.type}</span>
                        <span class="card-tuition ${p.tuition === 0 ? 'free' : ''}">${tuitionDisplay}</span>
                    </div>
                    <div class="card-benefits">${benefitsHTML}</div>
                    <div class="card-footer">
                        <a href="https://wa.me/${whatsappNumber}?text=${whatsappMsg}" 
                           class="btn-whatsapp" target="_blank">
                            <i class="fab fa-whatsapp"></i> Ask on WhatsApp
                        </a>
                        ${scholarshipBadge}
                    </div>
                </div>
            `;
        }).join('');
    }

    // ============================================================
    // TOAST NOTIFICATION
    // ============================================================

    function showToast(message) {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        if (!toast || !toastMessage) return;
        toastMessage.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================

    cityFilter.addEventListener('change', render);
    typeFilter.addEventListener('change', render);
    tuitionFilter.addEventListener('change', render);
    sortFilter.addEventListener('change', render);

    clearBtn.addEventListener('click', () => {
        cityFilter.value = 'all';
        typeFilter.value = 'all';
        tuitionFilter.value = 'all';
        sortFilter.value = 'price-asc';
        render();
        showToast('🔄 Filters reset');
    });

    // ============================================================
    // START THE APP
    // ============================================================

    loadPrograms();
</script>
